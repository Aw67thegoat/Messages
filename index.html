<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Family Nexus // Mobile Sync</title>
    <style>
        :root {
            --bg-dark: #0a0b10;
            --bg-panel: #121420;
            --accent-glow: #00f0ff;
            --accent-purple: #9d4edd;
            --text-main: #f4f4f6;
            --text-muted: #6c757d;
            --border-color: #24293e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        .view {
            display: none;
            width: 100%;
            height: 100%;
        }

        .view.active {
            display: flex;
        }

        /* --- LOGIN VIEW --- */
        #login-view {
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .login-card {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
            border-radius: 12px;
            padding: 25px 20px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card h1 {
            font-size: 1.6rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
            color: #fff;
            text-transform: uppercase;
        }

        .login-card h1 span {
            color: var(--accent-glow);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 0.85rem;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .profile-btn {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px 10px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .avatar-circle {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
        }

        .profile-name {
            color: var(--text-main);
            font-weight: 500;
            font-size: 0.95rem;
        }

        /* --- ACCESS RESTRAINT MODAL --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(10, 11, 16, 0.9);
            justify-content: center;
            align-items: center;
            z-index: 200;
            padding: 15px;
        }

        .modal.active { display: flex; }

        .modal-content {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            padding: 25px;
            border-radius: 12px;
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .modal-content h3 { margin-bottom: 15px; color: #fff; font-size: 1.1rem; }

        .modal-content input {
            width: 100%;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            margin-bottom: 20px;
            outline: none;
            font-size: 1rem;
            text-align: center;
        }

        .modal-content input:focus { border-color: var(--accent-glow); }

        .modal-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
        }

        .btn-primary { background-color: var(--accent-glow); color: var(--bg-dark); }
        .btn-secondary { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-muted); }

        /* --- MAIN APP INTERFACE --- */
        #app-view { display: none; flex-direction: column; height: 100%; width: 100%; position: relative; }
        #app-view.active { display: flex; }

        .sidebar {
            position: fixed;
            top: 0; left: 0; bottom: 0;
            width: 280px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            height: 100%;
            z-index: 150;
            transform: translateX(-100%);
            transition: transform 0.25s ease-out;
        }

        .sidebar.open {
            transform: translateX(0);
        }

        .sidebar-header {
            padding: 15px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-user-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .current-user-tag { display: flex; align-items: center; gap: 10px; }
        .current-user-tag .avatar-circle { width: 32px; height: 32px; font-size: 0.85rem; }

        .sidebar-controls {
            display: flex;
            gap: 12px;
            font-size: 0.8rem;
            flex-wrap: wrap;
            margin-top: 5px;
        }

        .control-link {
            color: var(--text-muted);
            cursor: pointer;
            text-decoration: underline;
            background: none;
            border: none;
        }

        .member-list { flex: 1; padding: 15px; overflow-y: auto; }
        .member-list-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 10px; }
        .member-status-row { display: flex; align-items: center; gap: 12px; padding: 8px 0; }
        .status-dot { width: 8px; height: 8px; background-color: #2ec4b6; border-radius: 50%; box-shadow: 0 0 6px #2ec4b6; }

        .admin-box {
            background-color: rgba(157, 78, 221, 0.05);
            border: 1px dashed var(--accent-purple);
            border-radius: 6px;
            padding: 10px;
            margin-top: 5px;
            display: none;
            max-height: 150px;
            overflow-y: auto;
        }
        .admin-title { font-size: 0.7rem; text-transform: uppercase; color: var(--accent-purple); font-weight: bold; margin-bottom: 5px; }
        .admin-item { font-size: 0.8rem; margin: 4px 0; display: flex; justify-content: space-between; }

        /* Chat Layout Configuration */
        .chat-container { display: flex; flex-direction: column; background-color: var(--bg-dark); height: 100%; width: 100%; overflow: hidden; }
        .chat-header { height: 60px; padding: 0 15px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; background-color: rgba(18, 20, 32, 0.5); flex-shrink: 0; }
        .chat-title h2 { font-size: 1rem; font-weight: 600; }
        .chat-title p { font-size: 0.75rem; color: var(--text-muted); }

        .menu-toggle {
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            padding: 6px 12px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 500;
        }

        .message-wall { flex: 1 1 auto; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; -webkit-overflow-scrolling: touch; }
        .msg-row { display: flex; flex-direction: column; max-width: 85%; width: fit-content; }
        .msg-row.incoming { align-self: flex-start; align-items: flex-start; }
        .msg-row.outgoing { align-self: flex-end; align-items: flex-end; }
        .msg-meta { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 3px; padding: 0 4px; }
        
        .msg-bubble { padding: 10px 14px; border-radius: 14px; font-size: 0.9rem; line-height: 1.35; word-break: break-word; }
        .incoming .msg-bubble { background-color: var(--bg-panel); color: var(--text-main); border: 1px solid var(--border-color); border-top-left-radius: 2px; }
        .outgoing .msg-bubble { background: linear-gradient(135deg, var(--accent-purple), #7209b7); color: #fff; border-top-right-radius: 2px; }

        .input-deck { padding: 12px 15px; border-top: 1px solid var(--border-color); background-color: var(--bg-panel); flex-shrink: 0; padding-bottom: calc(12px + env(safe-area-inset-bottom)); }
        .input-form { display: flex; gap: 10px; width: 100%; }
        .input-form input { flex: 1; background-color: var(--bg-dark); border: 1px solid var(--border-color); border-radius: 8px; padding: 12px; color: var(--text-main); font-size: 16px; outline: none; min-width: 0; }
        .input-form input:focus { border-color: var(--accent-glow); }
        
        .send-btn { 
            background-color: var(--accent-glow); 
            color: var(--bg-dark); 
            border: none; 
            border-radius: 8px; 
            padding: 0 20px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 0.9rem;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-backdrop {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 140;
        }
        .sidebar.open + .sidebar-backdrop {
            display: block;
        }
    </style>
</head>
<body>

    <div id="login-view" class="view active">
        <div class="login-card">
            <h1>Family <span>Nexus</span></h1>
            <p class="subtitle">Firebase Crossplay Node Live</p>
            <div class="profile-grid" id="profile-selector"></div>
        </div>
    </div>

    <div id="password-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Enter Profile Key</h3>
            <input type="password" id="modal-pass-input" placeholder="••••••••">
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closePasswordModal()">Cancel</button>
                <button class="btn btn-primary" id="modal-submit-btn">Verify</button>
            </div>
        </div>
    </div>

    <div id="app-view" class="view">
        <aside class="sidebar" id="sidebar-drawer">
            <div class="sidebar-header">
                <div class="sidebar-user-row">
                    <div class="current-user-tag" id="current-user-display"></div>
                    <button class="control-link" onclick="logout()">Exit</button>
                </div>
                <div class="sidebar-controls">
                    <button class="control-link" onclick="promptChangePassword()">Change Password</button>
                    <button class="control-link" id="bedo-master-toggle" style="display:none;" onclick="toggleAdminPanel()">Admin Node</button>
                </div>
                <div class="admin-box" id="admin-panel">
                    <div class="admin-title">Master View Matrix</div>
                    <div id="admin-password-list"></div>
                </div>
            </div>
            <div class="member-list">
                <div class="member-list-title">Household Network</div>
                <div id="family-directory"></div>
            </div>
        </aside>
        
        <div class="sidebar-backdrop" onclick="toggleSidebar(false)"></div>

        <main class="chat-container">
            <header class="chat-header">
                <div class="chat-title">
                    <h2>Main House Channel</h2>
                    <p id="connection-status">Connecting...</p>
                </div>
                <button class="menu-toggle" onclick="toggleSidebar(true)">Profiles</button>
            </header>

            <div class="message-wall" id="message-wall"></div>

            <div class="input-deck">
                <form class="input-form" id="chat-form">
                    <input type="text" id="msg-input" placeholder="Message family..." autocomplete="off" required>
                    <button type="submit" class="send-btn" id="send-click-btn">Send</button>
                </form>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIUXd4bIDSREr3Ktl-qXCsE5GnxkNf0Qs",
            authDomain: "family-messages-abadb.firebaseapp.com",
            databaseURL: "https://family-messages-abadb-default-rtdb.firebaseio.com",
            projectId: "family-messages-abadb",
            storageBucket: "family-messages-abadb.firebasestorage.app",
            messagingSenderId: "1056419617993",
            appId: "1:1056419617993:web:f6e56172e9709ab7158118",
            measurementId: "G-67JXTM5WE8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const familyProfiles = [
            { id: "dad", name: "Dad", color: "#457b9d", initial: "D" },
            { id: "mom", name: "Mom", color: "#e63946", initial: "M" },
            { id: "bedo", name: "Bedo", color: "#9d4edd", initial: "B" },
            { id: "tym", name: "Tym", color: "#2ec4b6", initial: "T" }
        ];

        let currentUser = null;

        generateProfileSelectionGrid();
        document.getElementById('connection-status').innerText = "Live Cloud Active";

        const messagesRef = ref(db, 'messages');
        onValue(messagesRef, (snapshot) => {
            renderMessages(snapshot.val());
        });

        const profilesRef = ref(db, 'profiles');
        onValue(profilesRef, (snapshot) => {
            if (currentUser && currentUser.id === 'bedo' && document.getElementById('admin-panel').style.display === 'block') {
                loadAdminPasswords(snapshot.val());
            }
        });

        checkExistingSession();

        const chatForm = document.getElementById('chat-form');
        chatForm.addEventListener('submit', handleFormSubmit);

        // Track virtual layout dimensions and match viewport directly
        function updateViewportHeight() {
            const viewHeight = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            document.documentElement.style.height = viewHeight + 'px';
            document.body.style.height = viewHeight + 'px';
            
            const wall = document.getElementById('message-wall');
            if (wall) wall.scrollTop = wall.scrollHeight;
        }

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', updateViewportHeight);
            window.visualViewport.addEventListener('scroll', updateViewportHeight);
        }
        window.addEventListener('resize', updateViewportHeight);
        window.addEventListener('orientationchange', () => {
            setTimeout(updateViewportHeight, 200);
        });

        async function handleFormSubmit(event) {
            event.preventDefault();
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text || !currentUser) return;

            const btn = document.getElementById('send-click-btn');
            btn.disabled = true;

            try {
                const messagesRef = ref(db, 'messages');
                const newMsgRef = push(messagesRef);
                
                await set(newMsgRef, {
                    id: newMsgRef.key,
                    sender_id: currentUser.id,
                    sender_name: currentUser.name,
                    text: text,
                    timestamp: new Date().toISOString()
                });
                
                input.value = '';
            } catch (err) {
                console.error(err);
            } finally {
                btn.disabled = false;
                input.focus();
                setTimeout(() => { updateViewportHeight(); }, 50);
            }
        }

        window.toggleSidebar = function(open) {
            const drawer = document.getElementById('sidebar-drawer');
            if(open) drawer.classList.add('open');
            else drawer.classList.remove('open');
        }

        function generateProfileSelectionGrid() {
            const container = document.getElementById('profile-selector');
            if (!container) return;
            container.innerHTML = '';
            familyProfiles.forEach(member => {
                const button = document.createElement('button');
                button.className = 'profile-btn';
                button.onclick = () => handleLoginClick(member.id);
                button.innerHTML = `
                    <div class="avatar-circle" style="background-color: ${member.color}">${member.initial}</div>
                    <div class="profile-name">${member.name}</div>
                `;
                container.appendChild(button);
            });
        }

        async function handleLoginClick(userId) {
            const dbRef = ref(db);
            const snapshot = await get(child(dbRef, `profiles/${userId}`));
            const savedPassword = snapshot.exists() ? snapshot.val().password : "";

            if (savedPassword && savedPassword !== "") {
                openPasswordModal("Enter Profile Password", (pass) => {
                    if (pass === savedPassword) {
                        closePasswordModal();
                        executeSessionLogin(userId);
                    } else {
                        alert("Incorrect Profile Key.");
                    }
                });
            } else {
                executeSessionLogin(userId);
            }
        }

        function executeSessionLogin(userId) {
            const user = familyProfiles.find(p => p.id === userId);
            currentUser = user;
            localStorage.setItem('nexus_current_user', userId);

            document.getElementById('current-user-display').innerHTML = `
                <div class="avatar-circle" style="background-color: ${user.color}">${user.initial}</div>
                <div class="profile-name" style="font-size:0.9rem; margin-left: 10px;">${user.name}</div>
            `;

            if (user.id === 'bedo') {
                document.getElementById('bedo-master-toggle').style.display = 'inline-block';
            } else {
                document.getElementById('bedo-master-toggle').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'none';
            }

            const directoryContainer = document.getElementById('family-directory');
            directoryContainer.innerHTML = '';
            familyProfiles.forEach(member => {
                if(member.id !== currentUser.id) {
                    const row = document.createElement('div');
                    row.className = 'member-status-row';
                    row.innerHTML = `<div class="status-dot"></div><span style="font-size:0.9rem; font-weight:500;">${member.name}</span>`;
                    directoryContainer.appendChild(row);
                }
            });

            document.getElementById('login-view').classList.remove('active');
            document.getElementById('app-view').classList.add('active');
            toggleSidebar(false);
            
            updateViewportHeight();
        }

        function checkExistingSession() {
            const savedUserId = localStorage.getItem('nexus_current_user');
            if (savedUserId) {
                executeSessionLogin(savedUserId);
            }
        }

        window.logout = function() {
            localStorage.removeItem('nexus_current_user');
            currentUser = null;
            document.getElementById('app-view').classList.remove('active');
            document.getElementById('login-view').classList.add('active');
            toggleSidebar(false);
        }

        window.closePasswordModal = function() {
            document.getElementById('password-modal').classList.remove('active');
        }

        function openPasswordModal(titleText, submitCallback) {
            document.getElementById('modal-title').innerText = titleText;
            const input = document.getElementById('modal-pass-input');
            input.value = "";
            document.getElementById('password-modal').classList.add('active');
            input.focus();
            
            document.getElementById('modal-submit-btn').onclick = () => {
                submitCallback(input.value);
            };
        }

        window.promptChangePassword = function() {
            openPasswordModal("Configure New Password", async (newPassword) => {
                await set(ref(db, `profiles/${currentUser.id}`), { password: newPassword });
                alert("Password saved to Cloud.");
                closePasswordModal();
            });
        }

        window.toggleAdminPanel = async function() {
            const panel = document.getElementById('admin-panel');
            if (panel.style.display === 'block') {
                panel.style.display = 'none';
            } else {
                panel.style.display = 'block';
                const snapshot = await get(ref(db, 'profiles'));
                loadAdminPasswords(snapshot.val());
            }
        }

        function loadAdminPasswords(profilesData) {
            if (currentUser.id !== 'bedo') return;
            const listContainer = document.getElementById('admin-password-list');
            listContainer.innerHTML = '';

            familyProfiles.forEach(account => {
                const cloudNode = profilesData ? profilesData[account.id] : null;
                const displayPass = (cloudNode && cloudNode.password) ? cloudNode.password : "[None Set]";
                
                const div = document.createElement('div');
                div.className = 'admin-item';
                div.innerHTML = `<span>${account.name}:</span> <span style="color:var(--accent-glow); font-family:monospace;">${escapeHTML(displayPass)}</span>`;
                listContainer.appendChild(div);
            });
        }

        function renderMessages(messagesData) {
            const wall = document.getElementById('message-wall');
            const isAtBottom = wall.scrollHeight - wall.scrollTop <= wall.clientHeight + 150;
            
            wall.innerHTML = '';
            if (!messagesData) return;

            const sortedMessages = Object.values(messagesData).sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

            sortedMessages.forEach(msg => {
                const isOutgoing = msg.sender_id === currentUser.id;
                const row = document.createElement('div');
                row.className = `msg-row ${isOutgoing ? 'outgoing' : 'incoming'}`;
                const timestamp = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                row.innerHTML = `
                    <div class="msg-meta">${isOutgoing ? 'You' : msg.sender_name} • ${timestamp}</div>
                    <div class="msg-bubble">${escapeHTML(msg.text)}</div>
                `;
                wall.appendChild(row);
            });
            
            if (isAtBottom) {
                wall.scrollTop = wall.scrollHeight;
            }
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }
    </script>
</body>
</html>
