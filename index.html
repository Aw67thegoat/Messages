<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Nexus // Main Deck</title>
    <style>
        :root {
            --bg-dark: #0a0b10;
            --bg-panel: #121420;
            --accent-glow: #00f0ff;
            --accent-purple: #9d4edd;
            --text-main: #f4f4f6;
            --text-muted: #6c757d;
            --border-color: #24293e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .view {
            display: none;
            width: 100%;
            height: 100%;
        }

        .view.active {
            display: flex;
        }

        /* --- LOGIN VIEW --- */
        #login-view {
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .login-card {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            box-shadow: 0 0 30px rgba(0, 240, 255, 0.1);
            border-radius: 16px;
            padding: 40px;
            width: 450px;
            text-align: center;
        }

        .login-card h1 {
            font-size: 2.2rem;
            margin-bottom: 10px;
            letter-spacing: 1px;
            color: #fff;
            text-transform: uppercase;
        }

        .login-card h1 span {
            color: var(--accent-glow);
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.6);
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 35px;
            font-size: 0.9rem;
        }

        .profile-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .profile-btn {
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .profile-btn:hover {
            border-color: var(--accent-purple);
            background-color: rgba(157, 78, 221, 0.05);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(157, 78, 221, 0.1);
        }

        .avatar-circle {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .profile-name {
            color: var(--text-main);
            font-weight: 600;
            font-size: 1.1rem;
        }

        /* --- PASSWORD MODAL --- */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(10, 11, 16, 0.85);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal.active { display: flex; }

        .modal-content {
            background-color: var(--bg-panel);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 16px;
            width: 360px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
        }

        .modal-content h3 { margin-bottom: 20px; color: #fff; font-size: 1.2rem; }

        .modal-content input {
            width: 100%;
            background-color: var(--bg-dark);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 12px;
            color: #fff;
            margin-bottom: 25px;
            outline: none;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 2px;
        }

        .modal-content input:focus { border-color: var(--accent-glow); }

        .modal-actions {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.2s;
        }

        .btn-primary { background-color: var(--accent-glow); color: var(--bg-dark); }
        .btn-primary:hover { background-color: #00d8e6; }
        .btn-secondary { background-color: transparent; border: 1px solid var(--border-color); color: var(--text-muted); }
        .btn-secondary:hover { color: #fff; border-color: var(--text-muted); }

        /* --- MAIN APP INTERFACE --- */
        #app-view { flex-direction: row; }

        .sidebar {
            width: 320px;
            background-color: var(--bg-panel);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .sidebar-user-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .current-user-tag { display: flex; align-items: center; gap: 12px; }
        .current-user-tag .avatar-circle { width: 40px; height: 40px; font-size: 1.1rem; }

        .sidebar-controls {
            display: flex;
            gap: 15px;
            font-size: 0.85rem;
        }

        .control-link {
            color: var(--text-muted);
            cursor: pointer;
            text-decoration: underline;
            background: none;
            border: none;
        }

        .control-link:hover { color: var(--accent-glow); }

        .member-list { flex: 1; padding: 24px; overflow-y: auto; }
        .member-list-title { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); margin-bottom: 15px; }
        .member-status-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; }
        .status-dot { width: 8px; height: 8px; background-color: #2ec4b6; border-radius: 50%; box-shadow: 0 0 8px #2ec4b6; }

        .admin-box {
            background-color: rgba(157, 78, 221, 0.05);
            border: 1px dashed var(--accent-purple);
            border-radius: 8px;
            padding: 12px;
            margin-top: 10px;
            display: none;
        }
        .admin-title { font-size: 0.75rem; text-transform: uppercase; color: var(--accent-purple); font-weight: bold; margin-bottom: 8px; }
        .admin-item { font-size: 0.85rem; margin: 6px 0; display: flex; justify-content: space-between; }

        /* Chat Layout Configuration */
        .chat-container { flex: 1; display: flex; flex-direction: column; background-color: var(--bg-dark); }
        .chat-header { height: 80px; padding: 0 30px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; background-color: rgba(18, 20, 32, 0.3); }
        .chat-title h2 { font-size: 1.2rem; font-weight: 600; }
        .chat-title p { font-size: 0.8rem; color: var(--text-muted); margin-top: 2px; }

        .message-wall { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; }
        .msg-row { display: flex; flex-direction: column; max-width: 70%; }
        .msg-row.incoming { align-self: flex-start; align-items: flex-start; }
        .msg-row.outgoing { align-self: flex-end; align-items: flex-end; }
        .msg-meta { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 4px; padding: 0 4px; }
        
        .msg-bubble { padding: 12px 18px; border-radius: 16px; font-size: 0.95rem; line-height: 1.4; word-break: break-word; }
        .incoming .msg-bubble { background-color: var(--bg-panel); color: var(--text-main); border: 1px solid var(--border-color); border-top-left-radius: 4px; }
        .outgoing .msg-bubble { background: linear-gradient(135deg, var(--accent-purple), #7209b7); color: #fff; border-top-right-radius: 4px; box-shadow: 0 4px 12px rgba(157, 78, 221, 0.2); }

        .input-deck { padding: 24px 30px; border-top: 1px solid var(--border-color); background-color: var(--bg-panel); }
        .input-form { display: flex; gap: 15px; }
        .input-form input { flex: 1; background-color: var(--bg-dark); border: 1px solid var(--border-color); border-radius: 10px; padding: 16px; color: var(--text-main); font-size: 1rem; outline: none; transition: border-color 0.2s; }
        .input-form input:focus { border-color: var(--accent-glow); box-shadow: 0 0 10px rgba(0, 240, 255, 0.1); }
        .send-btn { background-color: var(--accent-glow); color: var(--bg-dark); border: none; border-radius: 10px; padding: 0 28px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: background 0.2s; }
        .send-btn:hover { background-color: #00d8e6; }
    </style>
</head>
<body>

    <div id="login-view" class="view active">
        <div class="login-card">
            <h1>Family <span>Nexus</span></h1>
            <p class="subtitle">Firebase Crossplay Node Live</p>
            <div class="profile-grid" id="profile-selector"></div>
        </div>
    </div>

    <div id="password-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Enter Profile Key</h3>
            <input type="password" id="modal-pass-input" placeholder="••••••••">
            <div class="modal-actions">
                <button class="btn btn-secondary" onclick="closePasswordModal()">Cancel</button>
                <button class="btn btn-primary" id="modal-submit-btn">Verify</button>
            </div>
        </div>
    </div>

    <div id="app-view" class="view">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-user-row">
                    <div class="current-user-tag" id="current-user-display"></div>
                    <button class="control-link" onclick="logout()">Exit</button>
                </div>
                <div class="sidebar-controls">
                    <button class="control-link" onclick="promptChangePassword()">Change Password</button>
                    <button class="control-link" id="bedo-master-toggle" style="display:none;" onclick="toggleAdminPanel()">Admin Node</button>
                </div>
                <div class="admin-box" id="admin-panel">
                    <div class="admin-title">Master View Matrix</div>
                    <div id="admin-password-list"></div>
                </div>
            </div>
            <div class="member-list">
                <div class="member-list-title">Household Network</div>
                <div id="family-directory"></div>
            </div>
        </aside>

        <main class="chat-container">
            <header class="chat-header">
                <div class="chat-title">
                    <h2>Main House Channel</h2>
                    <p id="connection-status">Connecting...</p>
                </div>
            </header>

            <div class="message-wall" id="message-wall"></div>

            <div class="input-deck">
                <form class="input-form" id="chat-form" onsubmit="sendMessage(event)">
                    <input type="text" id="msg-input" placeholder="Message family..." autocomplete="off" required>
                    <button type="submit" class="send-btn">Send</button>
                </form>
            </div>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDIUXd4bIDSREr3Ktl-qXCsE5GnxkNf0Qs",
            authDomain: "family-messages-abadb.firebaseapp.com",
            databaseURL: "https://family-messages-abadb-default-rtdb.firebaseio.com",
            projectId: "family-messages-abadb",
            storageBucket: "family-messages-abadb.firebasestorage.app",
            messagingSenderId: "1056419617993",
            appId: "1:1056419617993:web:f6e56172e9709ab7158118",
            measurementId: "G-67JXTM5WE8"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const familyProfiles = [
            { id: "dad", name: "Dad", color: "#457b9d", initial: "D" },
            { id: "mom", name: "Mom", color: "#e63946", initial: "M" },
            { id: "bedo", name: "Bedo", color: "#9d4edd", initial: "B" },
            { id: "tym", name: "Tym", color: "#2ec4b6", initial: "T" }
        ];

        let currentUser = null;

        generateProfileSelectionGrid();
        document.getElementById('connection-status').innerText = "Live Cloud Active";

        const messagesRef = ref(db, 'messages');
        onValue(messagesRef, (snapshot) => {
            renderMessages(snapshot.val());
        });

        const profilesRef = ref(db, 'profiles');
        onValue(profilesRef, (snapshot) => {
            if (currentUser && currentUser.id === 'bedo' && document.getElementById('admin-panel').style.display === 'block') {
                loadAdminPasswords(snapshot.val());
            }
        });

        checkExistingSession();

        function generateProfileSelectionGrid() {
            const container = document.getElementById('profile-selector');
            if (!container) return;
            container.innerHTML = '';
            familyProfiles.forEach(member => {
                const button = document.createElement('button');
                button.className = 'profile-btn';
                button.onclick = () => handleLoginClick(member.id);
                button.innerHTML = `
                    <div class="avatar-circle" style="background-color: ${member.color}">${member.initial}</div>
                    <div class="profile-name">${member.name}</div>
                `;
                container.appendChild(button);
            });
        }

        async function handleLoginClick(userId) {
            const dbRef = ref(db);
            const snapshot = await get(child(dbRef, `profiles/${userId}`));
            const savedPassword = snapshot.exists() ? snapshot.val().password : "";

            if (savedPassword && savedPassword !== "") {
                openPasswordModal("Enter Profile Password", (pass) => {
                    if (pass === savedPassword) {
                        closePasswordModal();
                        executeSessionLogin(userId);
                    } else {
                        alert("Incorrect Profile Key.");
                    }
                });
            } else {
                executeSessionLogin(userId);
            }
        }

        function executeSessionLogin(userId) {
            const user = familyProfiles.find(p => p.id === userId);
            currentUser = user;
            localStorage.setItem('nexus_current_user', userId);

            document.getElementById('current-user-display').innerHTML = `
                <div class="avatar-circle" style="background-color: ${user.color}">${user.initial}</div>
                <div class="profile-name">${user.name}</div>
            `;

            if (user.id === 'bedo') {
                document.getElementById('bedo-master-toggle').style.display = 'inline-block';
            } else {
                document.getElementById('bedo-master-toggle').style.display = 'none';
                document.getElementById('admin-panel').style.display = 'none';
            }

            const directoryContainer = document.getElementById('family-directory');
            directoryContainer.innerHTML = '';
            familyProfiles.forEach(member => {
                if(member.id !== currentUser.id) {
                    const row = document.createElement('div');
                    row.className = 'member-status-row';
                    row.innerHTML = `<div class="status-dot"></div><span>${member.name}</span>`;
                    directoryContainer.appendChild(row);
                }
            });

            document.getElementById('login-view').classList.remove('active');
            document.getElementById('app-view').classList.add('active');
            
            const wall = document.getElementById('message-wall');
            setTimeout(() => { wall.scrollTop = wall.scrollHeight; }, 100);
        }

        function checkExistingSession() {
            const savedUserId = localStorage.getItem('nexus_current_user');
            if (savedUserId) {
                executeSessionLogin(savedUserId);
            }
        }

        window.logout = function() {
            localStorage.removeItem('nexus_current_user');
            currentUser = null;
            document.getElementById('app-view').classList.remove('active');
            document.getElementById('login-view').classList.add('active');
        }

        window.closePasswordModal = function() {
            document.getElementById('password-modal').classList.remove('active');
        }

        function openPasswordModal(titleText, submitCallback) {
            document.getElementById('modal-title').innerText = titleText;
            const input = document.getElementById('modal-pass-input');
            input.value = "";
            document.getElementById('password-modal').classList.add('active');
            input.focus();
            
            document.getElementById('modal-submit-btn').onclick = () => {
                submitCallback(input.value);
            };
        }

        window.promptChangePassword = function() {
            openPasswordModal("Configure New Password", async (newPassword) => {
                await set(ref(db, `profiles/${currentUser.id}`), { password: newPassword });
                alert("Password saved to Cloud.");
                closePasswordModal();
            });
        }

        window.toggleAdminPanel = async function() {
            const panel = document.getElementById('admin-panel');
            if (panel.style.display === 'block') {
                panel.style.display = 'none';
            } else {
                panel.style.display = 'block';
                const snapshot = await get(ref(db, 'profiles'));
                loadAdminPasswords(snapshot.val());
            }
        }

        function loadAdminPasswords(profilesData) {
            if (currentUser.id !== 'bedo') return;
            const listContainer = document.getElementById('admin-password-list');
            listContainer.innerHTML = '';

            familyProfiles.forEach(account => {
                const cloudNode = profilesData ? profilesData[account.id] : null;
                const displayPass = (cloudNode && cloudNode.password) ? cloudNode.password : "[None Set]";
                
                const div = document.createElement('div');
                div.className = 'admin-item';
                div.innerHTML = `<span>${account.name}:</span> <span style="color:var(--accent-glow); font-family:monospace;">${escapeHTML(displayPass)}</span>`;
                listContainer.appendChild(div);
            });
        }

        function renderMessages(messagesData) {
            const wall = document.getElementById('message-wall');
            const isAtBottom = wall.scrollHeight - wall.scrollTop <= wall.clientHeight + 100;
            
            wall.innerHTML = '';
            if (!messagesData) return;

            const sortedMessages = Object.values(messagesData).sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp));

            sortedMessages.forEach(msg => {
                const isOutgoing = msg.sender_id === currentUser.id;
                const row = document.createElement('div');
                row.className = `msg-row ${isOutgoing ? 'outgoing' : 'incoming'}`;
                const timestamp = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

                row.innerHTML = `
                    <div class="msg-meta">${isOutgoing ? 'You' : msg.sender_name} • ${timestamp}</div>
                    <div class="msg-bubble">${escapeHTML(msg.text)}</div>
                `;
                wall.appendChild(row);
            });
            
            if (isAtBottom) {
                wall.scrollTop = wall.scrollHeight;
            }
        }

        window.sendMessage = async function(event) {
            event.preventDefault();
            const input = document.getElementById('msg-input');
            const text = input.value.trim();
            if (!text) return;

            const messagesRef = ref(db, 'messages');
            const newMsgRef = push(messagesRef);
            
            const newMsg = {
                id: newMsgRef.key,
                sender_id: currentUser.id,
                sender_name: currentUser.name,
                text: text,
                timestamp: new Date().toISOString()
            };

            input.value = '';
            await set(newMsgRef, newMsg);
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }
    </script>
</body>
</html>
